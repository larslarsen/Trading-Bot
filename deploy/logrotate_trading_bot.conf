# Log rotation for the trading-bot daemon logs.
# The daemons append to logs/*.log forever with no internal rotation, so files
# grow without bound (and the data_poller writes via systemd append:). Rotate
# daily, keep 14 days compressed, and copytruncate so the still-open file
# descriptors the daemons hold keep writing to the same inode.

/home/lars/trading-bot/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
    size 10M
}
