name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Run the trading-bot test suite on every push/PR.
# The repo has no pinned lockfile; we install the runtime + dev deps from
# requirements.txt (pinned to the venv-proven versions) and run pytest.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          . .venv/bin/activate
          python -m pytest -q
